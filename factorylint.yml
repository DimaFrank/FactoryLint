# ==========================================================
#  Azure Data Factory Linter Configuration
#  Each resource type has its own customizable naming rules
# ==========================================================

version: 1.11
description: >
  Enforces naming conventions and validation rules for Azure Data Factory resources.

resources:

  pipelines:
    enabled: true
    description: >
      Pipelines must follow: PL_<PROJECT>_<ENTITY>_<ACTION>
      Example: PL_MES_ORDERS_INGEST, PL_SAPBW_MASTERDATA_ORCHESTRATE
    naming:
      prefix: "PL_"
      case: "upper"
      separator: "_"
      pattern: "^PL_[A-Z0-9_]+$"
      min_separated_parts: 4
      max_separated_parts: 6
      allowed_actions:
        - INGEST
        - TRANSFORM
        - ORCHESTRATE
        - LOAD
        - COPY
        - EXTRACT
        - PROCESS
      description_required: true
      ignore_folder: "_Config"

  datasets:
    enabled: true
    naming:
      prefix: "DS"
      separator: "_"
      case: "upper"
      pattern: "^[A-Z0-9_]+$"
      required_source_position: 2   # e.g. DS_<SOURCE>_DETAIL_<FORMAT>
      allowed_source_abbreviations:
        "Azure Blob Storage": ABLB
        "Azure Cosmos DB SQL API": ACSA
        "Azure Cosmos DB MongDB API": ACMA
        "Azure Data Explorer": ADEX
        "Azure Data Lake Storage Gen2": ADLS
        "Azure Database for MariaDB": AMDB
        "Azure Database for MySQL": AMYS
        "Azure Database for PostgreSQL": APOS
        "Azure File Storage": AFIL
        "Azure Search": ASER
        "Azure SQL Database": ASQL
        "Azure SQL Database Managed Instance": ASQM
        "Azure Synapse Analytics (formerly SQL DW)": ASDW
        "Azure Table Storage": ATBL
        "Azure DataBricks": ADBR
        "Azure Cognitive Search": ACGS
        "Azure Synapse Analytics": ASA
        "SQL Server": SQL
        "Oracle": ORAC
        "Oracle Eloqua": ORAE
        "Oracle Responsys": ORAR
        "Oracle Service Cloud": ORSC
        "MySQL": MYSQ
        "DB2": DB2
        "Teradata": TDAT
        "PostgreSQL": POST
        "Sybase": SYBA
        "Cassandra": CASS
        "MongoDB": MONG
        "Amazon Redshift": ARED
        "SAP Business Warehouse": SAPW
        "SAP Cloud for Customer (C4C)": SAPC
        "SAP Table": SAPT
        "SAP HANA": HANA
        "Drill": DRILL
        "Google BigQuery": GBQ
        "Greenplum": GRPL
        "HBase": HBAS
        "Hive": HIVE
        "Apache Impala": IMPA
        "Informix": INMI
        "MariaDB": MDB
        "Microsoft Access": MACS
        "Netezza": NETZ
        "Phoenix": PHNX
        "Presto (Preview)": PRST
        "Spark": SPRK
        "Vertica": VERT
        "Snowflake": SNWF
        "MongoDB Atlas": MONG_ATLAS
        "Amazon RDS for Oracle": RDSORAC
        "Amazon RDS for SQL Server": RDSSQL
        "File System": FILE
        "HDFS": HDFS
        "Amazon S3": AMS3
        "FTP": FTP
        "SFTP": SFTP
        "Google Cloud Storage": GCS
        "Oracle Cloud Storage": OCS
        "Amazon S3 Compatible Storage": SMS3C
        "Generic ODBC": ODBC
        "Generic OData": ODAT
        "Generic REST": REST
        "Generic HTTP": HTTP
        "Salesforce": SAFC
        "Salesforce Service Cloud": SAFCSC
        "Salesforce Marketing Cloud": SAFOMC
        "GitHub": GITH
        "Jira": JIRA
        "Web Table (HTML)": WEBT
        "Amazon Marketplace Web Service": AMSMWS
        "Xero": XERO
        "SharePoint Online List": SHAREPOINT
        "ServiceNow": SERVICENOW
        "Dynamics (Microsoft Dataverse)": DATAV
        "Dynamics 365": D365
        "Dynamics AX": DAX
        "Dynamics CRM": DCRM
        "Microsoft 365": M365
        "SAP ECC": SAPE
      allowed_formats:
        - CSV
        - TABLE
        - PARQUET
        - JSON
        - EXCEL
        - AVRO
        - BIN
        - XML
        - ORC
      min_separated_parts: 4
      max_separated_parts: 8
    description: >
      Dataset name structure:
      DS_<SOURCE>_<DETAIL>_<FORMAT>
      Example: DS_ADLS_CUSTOMERS_CSV

  linked_services:
    enabled: true
    naming:
      prefix: "LS_"
      case: "upper"  # options: upper / lower / any
      pattern: "^[A-Z0-9_]+$"
      allowed_abbreviations:
        - ADLS  # Azure Data Lake Storage Gen2
        - ASQL  # Azure SQL Database
        - SQL   # SQL Server
        - KV    # Azure Key Vault
        - BLOB  # Azure Blob Storage
        - SAPT  # SAP Table
        - FILE  # File System
        - ADBR  # Azure Databricks
        - FUNC  # Azure Function
        - DATAV # Dataverse
        - SERVICENOW
        - HTTP
        - REST
        - SFTP 
      min_separated_parts: 2
      max_separated_parts: 5
      separator: "_"
    description: >
      Linked Services must start with "LS_" followed by a valid abbreviation (e.g. ADLS, SQL)
      and a descriptive suffix, all in uppercase.

  triggers:
    enabled: true
    naming:
      prefix: "TR_"
      separator: "_"
      case: "upper"
      pattern: "^[A-Z0-9_]+$"
      min_separated_parts: 4
      max_separated_parts: 7
      allowed_types:
        - SCHEDULE
        - EVENT
      allowed_frequencies:
        - HOURLY
        - DAILY
        - NIGHTLY
        - WEEKLY
        - MONTHLY
        - QUARTERLY
        - REALTIME
    description: >
      Triggers must follow: TR_<TYPE>_<FREQUENCY>_<DESCRIPTION>
      Example: TR_SCHEDULE_DAILY_MES_IOT

  integration_runtimes:
    enabled: false
    naming:
      prefix: "IR_"
      case: "upper"
      pattern: "^[A-Z0-9_]+$"
      allowed_types:
        - SHIR
        - AZURE
      min_separated_parts: 2
      max_separated_parts: 5
    description: >
      Integration Runtime names must start with "IR_" and include runtime type (e.g. SHIR, AZURE).

parameters:
  enabled: true
  naming:
    prefix: "p_"
    case: "lower"
    pattern: "^[a-z_][a-z0-9_]*$"
  description: >
    Parameters must use lowercase with underscores, prefixed by 'p_'.
    Applies to pipeline and dataset parameters.

variables:
  enabled: true
  naming:
    prefix: "v_"
    case: "lower"
    pattern: "^[a-z_][a-z0-9_]*$"
  description: >
    Variables must use lowercase with underscores, prefixed by 'v_'.
    Applies to pipeline variables.
